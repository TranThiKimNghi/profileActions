name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # setup java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # build spring boot
      - name: Build with Maven
        run: mvn -B clean package --file Nghi/Nghi/pom.xml

      # login docker hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # build docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springboot-profile:latest ./Nghi/Nghi

      # push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springboot-profile:latest