<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="left">
        <img id="avatar" src="https://i.pravatar.cc/200" class="avatar">

        <h2 id="name"></h2>
        <p id="job"></p>

        <div class="section">
            <h3>Contact</h3>
            <p id="email"></p>
            <p id="phone"></p>
            <p id="address"></p>
        </div>

        <div class="section">
            <h3>Links</h3>
            <a id="github" target="_blank">Github</a><br>
            <a id="linkedin" target="_blank">LinkedIn</a>
        </div>

    </div>


    <div class="right">

        <div class="section">
            <h2>About Me</h2>
            <p id="bio"></p>
        </div>

        <div class="section">
            <h2>Skills</h2>
            <p id="skills"></p>
        </div>

        <div class="section">
            <h2>Education</h2>
            <p id="university"></p>
            <p id="major"></p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
